<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ochena Bondhu — অচেনা বন্ধু</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="connecting" class="screen">
    <img src="logo.svg" alt="Ochena Bondhu" class="connecting-logo">
    <div class="spinner"></div>
    <div>Connecting...</div>
  </div>

  <div id="profile" class="screen hidden">
    <div class="profile-box">
      <h1 class="profile-title">
        <img src="logo.svg" alt="Ochena Bondhu" class="profile-logo">
        অচেনা বন্ধু
      </h1>
      <p class="profile-sub">Tell us a bit about yourself</p>
      <div class="field">
        <label for="profile-name">Your Name</label>
        <input type="text" id="profile-name" placeholder="Enter your name" maxlength="30">
      </div>
      <div class="field">
        <label for="profile-gender">Gender</label>
        <select id="profile-gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>
      <label class="age-check">
        <input type="checkbox" id="profile-18">
        <span>I am 18 years or older</span>
      </label>
      <p id="profile-error" class="error-msg hidden"></p>
      <button id="profile-submit" class="btn-primary">Continue</button>
    </div>
  </div>

  <div id="start" class="screen hidden">
    <div class="logo">
      <img src="logo.svg" alt="Ochena Bondhu" class="logo-img">
      <h1>অচেনা বন্ধু</h1>
    </div>
    <div class="subtitle" id="greeting">Find new friends, start a conversation</div>
    <p id="start-error" class="error-msg hidden"></p>
    <button id="start-btn" class="btn-primary">Start Chatting</button>
    <div class="camera-preview" style="position:relative">
      <video id="local-preview" autoplay muted playsinline></video>
      <span class="preview-label">Your camera</span>
    </div>
  </div>

  <div id="chat" class="screen hidden">
    <div id="partner-box">
      <video id="partner-video" autoplay playsinline></video>
      <div id="enc-badge" class="hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        End-to-end encrypted
      </div>
      <div id="placeholder" class="hidden">
        <div class="search-anim">
          <div class="pulse-ring"></div>
          <div class="pulse-ring inner"></div>
          <svg class="search-icon" viewBox="0 0 80 80" fill="none">
            <circle cx="40" cy="28" r="14" fill="currentColor" opacity="0.6"/>
            <path d="M16 68c0-14 10.8-24 24-24s24 10 24 24" stroke="currentColor" stroke-width="3" fill="none" opacity="0.6"/>
          </svg>
        </div>
        <div id="status-text" class="status-glitch">Finding a partner...</div>
        <div class="status-hint">Tap Next anytime to skip</div>
      </div>
    </div>

    <div id="self-box">
      <video id="self-video" autoplay muted playsinline></video>
      <span id="self-label">You</span>
    </div>

    <div id="controls">
      <button id="btn-next" class="ctrl" title="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
        <span>Next</span>
      </button>
      <button id="btn-mic" class="ctrl" title="Mic">
        <svg class="on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <svg class="off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-4.5 6.5"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M12 19v4M8 23h8"/>
        </svg>
        <span>Mic</span>
      </button>
      <button id="btn-cam" class="ctrl" title="Camera">
        <svg class="on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" stroke="currentColor" fill="none"/>
        </svg>
        <svg class="off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" stroke="currentColor" fill="none"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <span>Cam</span>
      </button>
      <button id="btn-chat" class="ctrl" title="Chat" style="position:relative">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>Chat</span>
        <span id="chat-badge" class="hidden"></span>
      </button>
      <button id="btn-stop" class="ctrl danger" title="Stop">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
        <span>Stop</span>
      </button>
    </div>

    <div id="panel">
      <div id="panel-header">
        <span>Chat</span>
        <button id="close-panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <div id="messages"></div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Message..." disabled>
        <button id="send-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
